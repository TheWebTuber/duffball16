name: Update ESP Live Stats

on:
  schedule:
    - cron: "*/5 * * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Fetch YouTube stats
        run: |
          mkdir -p live

          STATS_URL="https://www.googleapis.com/youtube/v3/channels?part=statistics&id=${{ secrets.YOUTUBE_CHANNEL_ID }}&key=${{ secrets.YOUTUBE_API_KEY }}"
          LIVE_URL="https://www.googleapis.com/youtube/v3/search?part=snippet&channelId=${{ secrets.YOUTUBE_CHANNEL_ID }}&eventType=live&type=video&key=${{ secrets.YOUTUBE_API_KEY }}"

          STATS=$(curl -s "$STATS_URL")
          LIVE=$(curl -s "$LIVE_URL")

          SUBS=$(echo "$STATS" | jq -r '.items[0].statistics.subscriberCount // "0"')
          VIEWS=$(echo "$STATS" | jq -r '.items[0].statistics.viewCount // "0"')
          VIDEOS=$(echo "$STATS" | jq -r '.items[0].statistics.videoCount // "0"')
          LIVE_COUNT=$(echo "$LIVE" | jq -r '.items | length')

          if [ "$LIVE_COUNT" -gt 0 ]; then
            STATUS="Streaming Live"
          else
            STATUS="Not Livestreaming"
          fi

          UPDATED=$(TZ="Europe/Amsterdam" date +"%H:%M")

          jq -n \
            --argjson subscribers "$SUBS" \
            --argjson views "$VIEWS" \
            --argjson videos "$VIDEOS" \
            --arg status "$STATUS" \
            --arg updated "$UPDATED" \
            '{
              subscribers: $subscribers,
              views: $views,
              videos: $videos,
              status: $status,
              updated: $updated
            }' > live/esp.json

      - name: Commit ESP JSON
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add live/esp.json
          git commit -m "Update ESP live stats" || exit 0
          git push
