<!DOCTYPE html>
<html lang="en">
<head>
  <script
    async
    src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-6881919842214298"
    crossorigin="anonymous"
  ></script>

  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>Duffball16 | Live YouTube Stats</title>

  <meta
    name="description"
    content="Track Duffball16's live YouTube statistics including subscriber count, views, videos, and livestream status in real time."
  />

  <meta
    name="keywords"
    content="Duffball16, YouTube, Live Stats, Subscribers, Views, Livestream, Gaming"
  />

  <meta name="author" content="Duffball16" />
  <meta name="robots" content="index, follow" />

  <!-- Canonical -->
  <link rel="canonical" href="https://duffball16.com/live/" />

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="img/duffball16.png" />
  <link rel="shortcut icon" href="img/duffball16.png" />

  <!-- Open Graph (Discord, WhatsApp, Facebook, Telegram) -->
  <meta property="og:type" content="website" />
  <meta property="og:title" content="Duffball16 | Live YouTube Stats" />
  <meta
    property="og:description"
    content="Live subscriber count, channel views, videos, and streaming status for Duffball16."
  />
  <meta property="og:url" content="https://duffball16.com/live/" />
  <meta
    property="og:image"
    content="https://duffball16.com/img/duffball16-share.jpg"
  />
  <meta property="og:site_name" content="Duffball16" />

  <!-- Twitter / X -->
  <meta name="twitter:card" content="summary_large_image" />
  <meta name="twitter:title" content="Duffball16 | Live YouTube Stats" />
  <meta
    name="twitter:description"
    content="Live subscriber count, views, videos, and stream status."
  />
  <meta
    name="twitter:image"
    content="https://duffball16.com/img/duffball16-share.jpg"
  />

  <!-- Theme Color -->
  <meta name="theme-color" content="#ff0000" />

  <link rel="stylesheet" href="css/live.css" />
</head>
<body>
  <main class="container">
    <div class="profile">
      <img src="img/duffball16.png" alt="Duffball16 profile picture" />
      <div>
        <p class="tag">YouTube Channel</p>
        <h1>Duffball16</h1>
      </div>
    </div>

    <div class="live-row">
      <span id="liveDot" class="dot offline"></span>
      <span id="liveStatus">Checking status...</span>
    </div>

<div class="stats">
  <div class="stat-card">
    <div class="label">Subscribers</div>
    <div class="number" id="subscribers">0</div>
  </div>

  <div class="stat-card">
    <div class="label">Views</div>
    <div class="number" id="views">0</div>
  </div>

  <div class="stat-card">
    <div class="label">Videos</div>
    <div class="number" id="videos">0</div>
  </div>

  <div class="stat-card">
    <div class="label">Status</div>
    <div class="number small-number" id="liveStatus">Checking...</div>
  </div>

  <div class="stat-card">
    <div class="label">Last Update</div>
    <div class="number small-number" id="updated">--:--</div>
  </div>

  <div class="stat-card">
    <div class="label">Clock</div>
    <div class="number small-number" id="clock">--:--</div>
  </div>
</div>

<div class="goal-box">
  <div class="goal-top">
    <span>Next Subscriber Goal</span>
    <strong id="goalText">Loading...</strong>
  </div>
  <div class="goal-bar">
    <div id="goalFill"></div>
  </div>
</div>

    <div class="actions">
      <a href="https://www.youtube.com/@DUFFBALL16" target="_blank">Visit Channel</a>
    </div>
  </main>

  <script src="js/live.js"></script>
</body>
</html>
